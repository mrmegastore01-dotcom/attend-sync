<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading — AttendSync</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9ff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    /* Logo / App Name */
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #3525cd;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e7ff;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* Text */
    .loading-text {
      font-size: 0.9rem;
      color: #6b7280;
      letter-spacing: 0.4px;
      animation: pulse 1.5s infinite;
    }

    /* Animations */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="logo">AttendSync</div>
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Loading</div>

<script>
  let dots = 0;
  setInterval(() => {
    dots = (dots + 1) % 4;
    document.getElementById("loadingText").textContent =
      "Loading" + ".".repeat(dots);
  }, 400);
  
</script>
  </div>

  <script>
    // Redirect after short delay (smooth UX)
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200); // 1.2 seconds
  </script>

</body>
</html>
