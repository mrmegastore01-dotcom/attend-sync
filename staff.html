<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff — AttendSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#3525cd;--primary-container:#4f46e5;--on-primary:#fff;--secondary-container:#b6b4ff;--background:#f9f9ff;--surface:#f9f9ff;--surface-lowest:#fff;--surface-low:#eff3ff;--surface-high:#dee9fd;--on-surface:#121c2a;--on-surface-variant:#4a5568;--shadow-tinted:rgba(18,28,42,0.06);--sidebar-w:260px;--header-h:68px;--error:#c0392b}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--background);color:var(--on-surface);min-height:100vh;display:flex;flex-direction:column}
    .app-shell{display:flex;flex:1}
    .main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0}
    .page-body{flex:1;padding:2rem;overflow-y:auto}

    /* Toolbar */
    .toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap svg{position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--on-surface-variant);pointer-events:none}
    .search-input{width:100%;padding:0.625rem 0.875rem 0.625rem 2.5rem;border-radius:0.625rem;border:1.5px solid rgba(199,196,216,0.6);background:var(--surface-lowest);font-size:0.875rem;font-family:inherit;color:var(--on-surface);outline:none;transition:border-color 0.2s}
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(53,37,205,0.08)}
    .btn{padding:0.625rem 1.25rem;border-radius:0.625rem;font-size:0.875rem;font-weight:600;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:0.5rem;transition:opacity 0.15s,transform 0.15s}
    .btn:hover:not(:disabled){opacity:0.88;transform:translateY(-1px)}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:var(--surface-low);color:var(--on-surface-variant)}
    .btn-danger{background:#fce4ec;color:#c62828}
    .btn svg{width:16px;height:16px}

    /* Table card */
    .table-card{background:var(--surface-lowest);border-radius:1rem;border:1px solid rgba(199,196,216,0.2);box-shadow:0 2px 8px var(--shadow-tinted);overflow:hidden;animation:fadeUp 0.4s ease both}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{padding:0.75rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:0.07em;background:var(--surface-low);border-bottom:1px solid rgba(199,196,216,0.2)}
    td{padding:0.875rem 1.25rem;font-size:0.875rem;border-bottom:1px solid rgba(199,196,216,0.1);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface-low)}
    .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-container));color:#fff;font-weight:700;font-size:0.8125rem;display:flex;align-items:center;justify-content:center}
    .name-cell{display:flex;align-items:center;gap:0.75rem}
    .actions-cell{display:flex;gap:0.5rem}
    .btn-icon{width:32px;height:32px;border-radius:0.5rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
    .btn-icon svg{width:15px;height:15px}
    .btn-icon.edit{background:var(--surface-low);color:var(--primary)}.btn-icon.edit:hover{background:rgba(53,37,205,0.12)}
    .btn-icon.del{background:#fce4ec;color:#c62828}.btn-icon.del:hover{background:#f8bbd0}
    .empty-state{padding:3rem;text-align:center;color:var(--on-surface-variant);font-size:0.875rem}

    /* Staff ID badge */
    .staff-id-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: linear-gradient(135deg, rgba(53,37,205,0.08), rgba(79,70,229,0.12));
      border: 1.5px solid rgba(53,37,205,0.2);
      color: var(--primary); font-family: 'Courier New', monospace;
      font-weight: 700; font-size: 0.875rem; letter-spacing: 0.1em;
      padding: 0.3rem 0.625rem; border-radius: 0.5rem;
      cursor: pointer; transition: all 0.15s; user-select: all;
    }
    .staff-id-badge:hover { background: rgba(53,37,205,0.15); border-color: var(--primary); }
    .staff-id-badge svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.6; }

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(18,28,42,0.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-overlay.show{display:flex}
    .modal{background:var(--surface-lowest);border-radius:1.25rem;padding:2rem;width:100%;max-width:500px;box-shadow:0 24px 64px rgba(18,28,42,0.2);animation:fadeUp 0.3s ease}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .modal-header h2{font-family:'Manrope',sans-serif;font-weight:700;font-size:1.25rem;color:var(--on-surface)}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--on-surface-variant);padding:4px;border-radius:6px}
    .modal-close svg{width:20px;height:20px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:0.375rem}
    .form-group.full{grid-column:1/-1}
    label{font-size:0.8125rem;font-weight:600;color:var(--on-surface)}
    .form-input{width:100%;padding:0.625rem 0.875rem;border-radius:0.625rem;border:1.5px solid rgba(199,196,216,0.6);background:var(--surface-low);font-size:0.875rem;font-family:inherit;color:var(--on-surface);outline:none;transition:border-color 0.2s}
    .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(53,37,205,0.08);background:var(--surface-lowest)}
    .form-input:disabled{opacity:0.65;cursor:not-allowed;background:var(--surface-high)}
    .modal-footer{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem}

    /* Staff ID preview in modal */
    .id-preview-box {
      background: linear-gradient(135deg, rgba(53,37,205,0.06), rgba(79,70,229,0.1));
      border: 1.5px dashed rgba(53,37,205,0.3);
      border-radius: 0.75rem; padding: 0.875rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .id-preview-box .id-label { font-size: 0.75rem; font-weight: 600; color: var(--on-surface-variant); text-transform: uppercase; letter-spacing: 0.08em; }
    .id-preview-box .id-value { font-family: 'Courier New', monospace; font-size: 1.5rem; font-weight: 700; color: var(--primary); letter-spacing: 0.15em; }
    .id-hint { font-size: 0.75rem; color: var(--on-surface-variant); margin-top: 0.375rem; }

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:900px){.main-content{margin-left:0}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="headerContainer"></div>
    <div class="page-body">
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search staff by name, department…" oninput="filterTable()" />
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Staff
        </button>
      </div>

      <div class="table-card">
        <div class="table-wrap">
          <table id="staffTable">
            <thead>
              <tr>
                <th>Staff ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="staffBody">
              <tr><td colspan="8" class="empty-state">Loading staff…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="footerContainer"></div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Staff Member</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-grid">

      <!-- Staff ID preview (add mode) / display (edit mode) -->
      <div class="form-group full" id="staffIdGroup">
        <label>Staff ID (Auto-Generated)</label>
        <div class="id-preview-box">
          <div>
            <div class="id-label">Portal Login ID</div>
            <div class="id-value" id="idPreviewValue">——————</div>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;opacity:0.5">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <span class="id-hint">This 6-digit ID will be used by the staff member to check in/out on the portal.</span>
      </div>

      <div class="form-group full">
        <label>Full Name *</label>
        <input class="form-input" id="fName" type="text" placeholder="e.g. John Smith" required />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input class="form-input" id="fEmail" type="email" placeholder="john@company.com" required />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input class="form-input" id="fPhone" type="tel" placeholder="+1 234 567 8900" />
      </div>
      <div class="form-group">
        <label>Department</label>
        <input class="form-input" id="fDept" type="text" placeholder="e.g. Engineering" />
      </div>
      <div class="form-group">
        <label>Role / Position</label>
        <input class="form-input" id="fRole" type="text" placeholder="e.g. Developer" />
      </div>
      <div class="form-group full">
        <label>Date Joined</label>
        <input class="form-input" id="fJoined" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveStaff()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="saveBtnText">Save Staff</span>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script>
  injectSharedCSS();
  const sb = getSupabase();
  let allStaff  = [];
  let editingId = null;
  let generatedCode = null; // holds the code for new staff

  (async () => {
    const session = await requireAuth();
    if (!session) return;
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('staff', session.user.email);
    document.getElementById('headerContainer').innerHTML  = renderHeader('Staff Management', 'Add, edit and manage your team members');
    document.getElementById('footerContainer').innerHTML  = renderFooter();
    await loadStaff();
  })();

  /* ── Generate a unique 6-digit code ── */
  async function generateUniqueCode() {
    let code, exists;
    const existingCodes = new Set(allStaff.map(s => s.staff_code));
    do {
      code = String(Math.floor(100000 + Math.random() * 900000));
    } while (existingCodes.has(code));
    return code;
  }

  async function loadStaff() {
    try {
      const { data, error } = await sb.from('staff').select('*').order('name');
      if (error) throw error;
      allStaff = data || [];
      renderTable(allStaff);
    } catch (err) {
      showToast('Error loading staff: ' + err.message, 'error');
      document.getElementById('staffBody').innerHTML = `<tr><td colspan="8" class="empty-state">Failed to load staff data.</td></tr>`;
    }
  }

  function renderTable(list) {
    const body = document.getElementById('staffBody');
    if (!list.length) {
      body.innerHTML = `<tr><td colspan="8" class="empty-state">No staff members found. Click "Add Staff" to get started.</td></tr>`;
      return;
    }
    body.innerHTML = list.map(s => `
      <tr>
        <td>
          ${s.staff_code
            ? `<span class="staff-id-badge" onclick="copyCode('${s.staff_code}')" title="Click to copy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                ${s.staff_code}
               </span>`
            : '<span style="color:var(--on-surface-variant);font-size:0.8rem">—</span>'
          }
        </td>
        <td>
          <div class="name-cell">
            <div class="avatar">${s.name[0].toUpperCase()}</div>
            <strong>${s.name}</strong>
          </div>
        </td>
        <td>${s.email || '—'}</td>
        <td>${s.phone || '—'}</td>
        <td>${s.department || '—'}</td>
        <td>${s.role || '—'}</td>
        <td>${s.joined_date ? fmtDate(s.joined_date) : '—'}</td>
        <td>
          <div class="actions-cell">
            <button class="btn-icon edit" onclick="editStaff('${s.id}')" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon del" onclick="deleteStaff('${s.id}', '${s.name.replace(/'/g,"\\'")}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allStaff.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.department || '').toLowerCase().includes(q) ||
      (s.email || '').toLowerCase().includes(q) ||
      (s.role || '').toLowerCase().includes(q) ||
      (s.staff_code || '').includes(q)
    ));
  }

  async function openModal(staff = null) {
    editingId = staff ? staff.id : null;
    document.getElementById('modalTitle').textContent    = staff ? 'Edit Staff Member' : 'Add Staff Member';
    document.getElementById('saveBtnText').textContent   = staff ? 'Update Staff' : 'Save Staff';
    document.getElementById('fName').value   = staff?.name        || '';
    document.getElementById('fEmail').value  = staff?.email       || '';
    document.getElementById('fPhone').value  = staff?.phone       || '';
    document.getElementById('fDept').value   = staff?.department  || '';
    document.getElementById('fRole').value   = staff?.role        || '';
    document.getElementById('fJoined').value = staff?.joined_date || '';

    const idPreview = document.getElementById('idPreviewValue');
    const idGroup   = document.getElementById('staffIdGroup');

    if (staff) {
      // Edit mode — show existing code, locked
      idPreview.textContent = staff.staff_code || '—';
      idGroup.querySelector('.id-hint').textContent = 'Staff ID is permanent and cannot be changed.';
      generatedCode = null;
    } else {
      // Add mode — generate new code
      generatedCode = await generateUniqueCode();
      idPreview.textContent = generatedCode;
      idGroup.querySelector('.id-hint').textContent = 'This 6-digit ID will be used by the staff member to check in/out on the portal.';
    }

    document.getElementById('staffModal').classList.add('show');
    document.getElementById('fName').focus();
  }

  function closeModal() {
    document.getElementById('staffModal').classList.remove('show');
    editingId = null;
    generatedCode = null;
  }

  function editStaff(id) {
    const s = allStaff.find(x => x.id === id);
    if (s) openModal(s);
  }

  async function saveStaff() {
    const name  = document.getElementById('fName').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    if (!name)  { showToast('Name is required.', 'error'); return; }
    if (!email) { showToast('Email is required.', 'error'); return; }

    const payload = {
      name, email,
      phone:       document.getElementById('fPhone').value.trim()  || null,
      department:  document.getElementById('fDept').value.trim()   || null,
      role:        document.getElementById('fRole').value.trim()   || null,
      joined_date: document.getElementById('fJoined').value        || null,
    };

    // Only set staff_code on insert (new staff)
    if (!editingId && generatedCode) {
      payload.staff_code = generatedCode;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    try {
      if (editingId) {
        const { error } = await sb.from('staff').update(payload).eq('id', editingId);
        if (error) throw error;
        showToast('Staff member updated successfully!');
      } else {
        const { error } = await sb.from('staff').insert(payload);
        if (error) throw error;
        showToast(`Staff member added! Their ID is: ${generatedCode}`);
      }
      closeModal();
      await loadStaff();
    } catch (err) {
      showToast('Error saving staff: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteStaff(id, name) {
    if (!confirm(`Delete "${name}"? This will also remove their attendance records.`)) return;
    try {
      const { error } = await sb.from('staff').delete().eq('id', id);
      if (error) throw error;
      showToast(`"${name}" deleted.`);
      await loadStaff();
    } catch (err) {
      showToast('Error deleting staff: ' + err.message, 'error');
    }
  }

  function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => {
      showToast(`Staff ID ${code} copied to clipboard!`);
    }).catch(() => {
      showToast('Could not copy. ID: ' + code, 'info');
    });
  }

  // Close modal on overlay click
  document.getElementById('staffModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
